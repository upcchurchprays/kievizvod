<!DOCTYPE html>
<html lang="{{ site.lang }}" data-theme="day">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  {% seo %}

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  <link rel="alternate" type="application/atom+xml" href="{{ '/feed.xml' | relative_url }}" />

  <script>
    // Уникаємо миготіння при завантаженні
    (function(){
      var t = localStorage.getItem("molytovnyk-theme") || "day";
      document.documentElement.dataset.theme = t;
      var s = localStorage.getItem("molytovnyk-size");
      if (s) document.documentElement.style.setProperty("--reader-size", s + "px");
      var f = localStorage.getItem("molytovnyk-font");
      if (f) document.documentElement.dataset.font = f;
    })();
  </script>
</head>
<body>
  {% include header.html %}

  <main class="app">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/reader.js' | relative_url }}"></script>
</body>
</html>
