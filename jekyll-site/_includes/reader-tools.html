<div class="reader-tools">
  <div class="seg" role="group" aria-label="Шрифт">
    <button data-font="old"       title="Old Standard TT — церковний стиль">Аа</button>
    <button data-font="cormorant" title="Cormorant Garamond">Аа</button>
    <button data-font="lora"      title="Lora">Аа</button>
  </div>
  <div class="seg" role="group" aria-label="Розмір шрифту">
    <button id="font-dec" title="Зменшити">А−</button>
    <button id="font-inc" title="Збільшити">А+</button>
  </div>
  <button class="theme-btn" id="theme-toggle-2" aria-label="Перемкнути тему">
    <span class="theme-day">☀</span>
    <span class="theme-night">☾</span>
  </button>
</div>
